services:
  - type: web
    name: excel-to-quiz-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: excel-to-quiz
      - key: CORS_ORIGIN
        sync: false
